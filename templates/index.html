<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Content Detector</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>AI Content Detector</h1>
        <p class="subtitle">Upload a file or paste text to detect AI-like writing patterns.</p>
      </div>

      <button id="themeToggle" class="theme-btn" type="button" aria-label="Toggle theme">
        🌙
      </button>
    </div>

    <div class="card">
      <form id="detectForm">
        <label for="text">Paste Text</label>
        <textarea id="text" name="text" rows="8" placeholder="Paste text here..."></textarea>

        <div class="divider">OR</div>

        <label for="file">Upload File</label>
        <input type="file" id="file" name="file" accept=".txt,.pdf,.docx" />

        <button type="submit">Analyze</button>
      </form>
    </div>

    <div id="loading" class="loading hidden">Analyzing...</div>

    <div id="errorBox" class="error hidden"></div>

    <div id="resultBox" class="result hidden">
      <h2>Result</h2>

      <div class="score-row">
        <div id="overallLabel" class="badge"></div>
        <div id="overallScore" class="score"></div>
      </div>

      <div class="stats" id="stats"></div>

      <div class="signals-box">
        <h3>Explanation Signals</h3>
        <ul id="signals"></ul>
      </div>

      <div class="sentences-box">
        <h3>Sentence-level Analysis</h3>
        <div id="sentenceResults"></div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
